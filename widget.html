<!DOCTYPE html>
<html>
<head>
    <title>Help Center</title>
    <style>
        /* This stretches the help center panel to fill the entire portal tab window */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- Zoho Desk ASAP Code Snippet -->
    <script type="text/javascript" id="zohodeskasap">
        var d=document;
        s=d.createElement("script"),
        s.type="text/javascript",
        s.id="zohodeskasapscript",
        s.defer=!0,
        s.nonce="{place_your_nonce_value_here}",
        s.src="https://desk.zoho.com.au/portal/api/web/asapApp/28179000000795005?orgId=7006116870",
        t=d.getElementsByTagName("script")[0],
        t.parentNode.insertBefore(s,t);

        // FORCES THE HELP CENTER TO AUTOMATICALLY OPEN ON LOAD
        window.ZohoDeskAsapReady = function() {
            window.ZohoDeskAsap.Extension.Launcher.show({
                "maximize": true
            });
        };
    </script>
</body>
</html>
