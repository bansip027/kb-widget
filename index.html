<title>Help Center</title>
<style>
  :root {
    --navy: #1C2128;
    --teal: #29BCAF;
    --teal-dark: #1f9a8f;
    --teal-deeper: #157A71;
    --teal-wash: #E7F8F6;
    --ink-soft: #565C63;
    --paper: #F6F7F6;
    --line: rgba(28,33,40,0.1);
    --f-display: 'Satoshi', -apple-system, 'Segoe UI', Arial, sans-serif;
    --f-body: 'Inter', -apple-system, 'Segoe UI', Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    font-family: var(--f-body);
    background: var(--paper);
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
  }
  .container {
    text-align: center;
    background: #ffffff;
    padding: 44px 40px;
    border-radius: 14px;
    border: 1px solid var(--line);
    box-shadow: 0 4px 24px rgba(28, 33, 40, 0.06);
    max-width: 440px;
    width: 100%;
  }
  .logo {
    width: 150px;
    height: auto;
    margin: 0 auto 28px;
    display: block;
  }
  h1 {
    margin: 0 0 12px;
    font-family: var(--f-display);
    font-weight: 700;
    font-size: 22px;
    color: var(--navy);
    text-wrap: balance;
  }
  p {
    font-size: 14.5px;
    color: var(--ink-soft);
    margin: 0 0 28px;
    line-height: 1.55;
  }
  .help-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background-color: var(--teal);
    color: #ffffff;
    text-decoration: none;
    padding: 13px 26px;
    font-family: var(--f-body);
    font-size: 15px;
    font-weight: 600;
    border-radius: 8px;
    transition: background-color 0.15s ease, transform 0.1s ease;
    box-shadow: 0 4px 14px rgba(41, 188, 175, 0.28);
  }
  .help-btn:hover { background-color: var(--teal-dark); }
  .help-btn:active { transform: scale(0.98); }
  .help-btn:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }
</style>
</head>
