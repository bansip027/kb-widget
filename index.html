<!DOCTYPE html>
<html>
<head>
    <title>Help Center</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 450px;
            width: 90%;
        }
        h1 { margin-bottom: 12px; font-size: 24px; color: #1a202c; }
        p { font-size: 15px; color: #4a5568; margin-bottom: 24px; line-height: 1.5; }
        
        /* The External Button Style */
        .help-btn {
            display: inline-block;
            background-color: #0060FF; /* Customize this to match your brand color */
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 12px rgba(0, 96, 255, 0.2);
        }
        .help-btn:hover {
            background-color: #004ecc;
        }
        .help-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Need Assistance?</h1>
        <p>Click the button below to launch our full Help Center in a new tab, where you can browse our complete knowledge base library, view community forums, and manage your tickets.</p>
        
        <!-- REPLACE THE URL BELOW WITH YOUR ACTUAL ZOHO DESK HELP CENTER LINK -->
        <a href="https://grevon.zohodesk.com.au/portal/en/kb/grevon" target="_blank" class="help-btn">
            Open Help Center ↗
        </a>
    </div>

    <!-- Zoho Desk ASAP Script (Kept as a backup launcher icon in the corner) -->
    <script type="text/javascript" id="zohodeskasap">
        var d=document;
        s=d.createElement("script"),
        s.type="text/javascript",
        s.id="zohodeskasapscript",
        s.defer=!0,
        s.nonce="{place_your_nonce_value_here}",
        s.src="https://zoho.com.au",
        t=d.getElementsByTagName("script")[0],
        t.parentNode.insertBefore(s,t);
    </script>

</body>
</html>
